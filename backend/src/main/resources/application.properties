# Smartwatch Backend - Environment-driven config
# All secrets via env vars - no hardcoded values

spring.application.name=smartwatch-backend
server.port=8085

# Database - overridden by Docker env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/smartwatch}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartwatch}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:smartwatch_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT - secret MUST be set in production
jwt.secret=${JWT_SECRET:dev-secret-min-256-bits-for-hs256-algorithm}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
