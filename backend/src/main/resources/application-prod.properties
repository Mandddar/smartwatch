# Production profile - activated via SPRING_PROFILES_ACTIVE=prod

server.port=8080

# Hibernate validates schema against Flyway-managed DB (never auto-alters)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway manages all schema changes
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=WARN
logging.level.com.smartwatch=INFO
